<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tidings — never miss a moment</title>
<meta name="description" content="Tidings remembers the birthdays, anniversaries, and holidays that matter — and helps you send something warm.">
<style>
  :root { color-scheme: light dark; }
  body { margin:0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
         display:flex; min-height:100vh; align-items:center; justify-content:center;
         background:#faf7f2; color:#2d2a26; }
  @media (prefers-color-scheme: dark) { body { background:#211f1c; color:#f0ece5; } }
  main { text-align:center; padding:2rem; max-width:26rem; }
  h1 { font-size:2.4rem; margin:0 0 .4rem; letter-spacing:-.02em; }
  p { font-size:1.05rem; line-height:1.5; opacity:.85; }
  .badge { margin-top:1.4rem; font-size:.95rem; opacity:.6; }
</style>
<!-- App Store redirect goes live at listing time:
     <meta http-equiv="refresh" content="0;url=APP_STORE_URL"> + JS fallback.
     Bare tidings.family is the growth-tag link baked into sent messages — this URL is forever. -->
</head>
<body>
<main>
  <h1>Tidings</h1>
  <p>The birthdays, anniversaries, and little moments that matter — remembered, and answered with something warm.</p>
  <p class="badge">Coming soon to the App&nbsp;Store.</p>
</main>
</body>
</html>
